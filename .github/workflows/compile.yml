name: Build & Push Documents

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TYPST_VERSION: "0.14.2"
  TARGET_REPO: patppuccin/portfolio
  RESUME_VARIANT: devops-resume
  RESUME_PATH: public/resume-patrick-ambrose.pdf
  LETTER_VARIANT: devops-letter
  LETTER_PATH: public/letter-patrick-ambrose.pdf

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Typst
        run: |
          wget -q https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz
          tar -xf typst-x86_64-unknown-linux-musl.tar.xz
          sudo install -m 755 typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst
          rm -rf typst-x86_64-unknown-linux-musl*

      - name: Compile documents
        run: |
          mkdir -p generated/resume generated/letter

          if [ -f "content/doc-resume/${RESUME_VARIANT}.yaml" ]; then
            typst compile doc-resume.typ generated/resume/patrick-ambrose-${RESUME_VARIANT}.pdf \
              --font-path ./assets/fonts \
              --input content=content/doc-resume/${RESUME_VARIANT}.yaml
          else
            echo "Resume variant ${RESUME_VARIANT} not found, skipping"
          fi

          if [ -f "content/doc-letter/${LETTER_VARIANT}.yaml" ]; then
            typst compile doc-letter.typ generated/letter/patrick-ambrose-${LETTER_VARIANT}.pdf \
              --font-path ./assets/fonts \
              --input content=content/doc-letter/${LETTER_VARIANT}.yaml
          else
            echo "Letter variant ${LETTER_VARIANT} not found, skipping"
          fi

      - name: Push to portfolio repo
        run: |
          set -e

          git config --global user.name "Pat Ambrose (CI)"
          git config --global user.email "actions@github.com"
          git config --global advice.detachedHead false
          git config --global init.defaultBranch main

          git clone --depth 1 https://${{ secrets.RESUME_PUSH_TO_PORTFOLIO_REPO }}@github.com/${TARGET_REPO}.git target-repo

          if [ -f "generated/resume/patrick-ambrose-${RESUME_VARIANT}.pdf" ]; then
            cp generated/resume/patrick-ambrose-${RESUME_VARIANT}.pdf target-repo/${RESUME_PATH}
          fi

          if [ -f "generated/letter/patrick-ambrose-${LETTER_VARIANT}.pdf" ]; then
            cp generated/letter/patrick-ambrose-${LETTER_VARIANT}.pdf target-repo/${LETTER_PATH}
          fi

          cd target-repo

          git add ${RESUME_PATH} ${LETTER_PATH}
          git diff --cached --quiet || git commit -m "chore(ci): update documents ($(date +'%Y-%m-%d %H:%M:%S'))"

          git push origin main
