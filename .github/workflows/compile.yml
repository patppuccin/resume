name: Build & Push Resume PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TYPST_VERSION: "0.14.2"
  TARGET_REPO: patppuccin/portfolio
  RESUME_VARIANT: devops-resume
  RESUME_PATH: public/resume-patrick-ambrose.pdf

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout resume source
        uses: actions/checkout@v4

      - name: Install Typst
        run: |
          wget -q https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz
          tar -xf typst-x86_64-unknown-linux-musl.tar.xz
          sudo install -m 755 typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst
          rm -rf typst-x86_64-unknown-linux-musl*

      - name: Compile Typst to PDF
        run: |
          mkdir -p generated
          typst compile resume.typ generated/patrick-ambrose-${RESUME_VARIANT}.pdf \
            --font-path ./assets/fonts \
            --input content=content/${RESUME_VARIANT}.yaml

      - name: Push to portfolio repo
        run: |
          set -e

          git config --global user.name "Pat Ambrose (CI)"
          git config --global user.email "actions@github.com"
          git config --global advice.detachedHead false
          git config --global init.defaultBranch main

          git clone --depth 1 https://${{ secrets.RESUME_PUSH_TO_PORTFOLIO_REPO }}@github.com/${TARGET_REPO}.git target-repo

          cp generated/patrick-ambrose-${RESUME_VARIANT}.pdf target-repo/${RESUME_PATH}

          cd target-repo

          git add ${RESUME_PATH}
          git diff --cached --quiet || git commit -m "chore(ci): update resume PDF ($(date +'%Y-%m-%d %H:%M:%S'))"

          git push origin main
