version: "3"

vars:
  BANNER: 'echo -e "\\033[1;33m$\\033[0m"'
  FONT_PATH: assets/fonts
  OUT_DIR: generated
  NAME: patrick-ambrose
  DEFAULT_VARIANT: devops-resume

tasks:
  default:
    desc: List available tasks
    cmds:
      - echo "run 'task --list' to see available tasks"

  watch:
    silent: true
    desc: "Watch for changes and recompile (usage: task watch [-- <variant>])"
    vars:
      VARIANT: "{{.CLI_ARGS | default .DEFAULT_VARIANT}}"
    cmds:
      - "{{.BANNER}} Watching changes to resume variant: {{.VARIANT}}"
      - typst watch resume.typ {{.OUT_DIR}}/{{.NAME}}-{{.VARIANT}}.pdf --font-path {{.FONT_PATH}} --input content=content/{{.VARIANT}}.yaml

  generate:
    silent: true
    desc: "Compile resume PDF (usage: task generate [-- <variant>])"
    vars:
      VARIANT: "{{.CLI_ARGS | default .DEFAULT_VARIANT}}"
    cmds:
      - "{{.BANNER}} Generating resume for the variant: {{.VARIANT}}"
      - cmd: powershell -NoProfile -Command "New-Item -ItemType Directory -Force -Path {{.OUT_DIR}} | Out-Null"
        platforms: [windows]
      - cmd: mkdir -p {{.OUT_DIR}}
        platforms: [linux, darwin]
      - typst compile resume.typ {{.OUT_DIR}}/{{.NAME}}-{{.VARIANT}}.pdf --font-path {{.FONT_PATH}} --input content=content/{{.VARIANT}}.yaml
      - "{{.BANNER}} done -> {{.OUT_DIR}}/{{.NAME}}-{{.VARIANT}}.pdf"

  list:
    silent: true
    desc: "List available variants"
    cmds:
      - "{{.BANNER}} Listing the available resume variants"
      - cmd: powershell -NoProfile -File scripts/list-variants.ps1
        platforms: [windows]
      - cmd: bash scripts/list-variants.sh
        platforms: [linux, darwin]

  cleanup:
    silent: true
    desc: "Remove generated PDFs"
    cmds:
      - "{{.BANNER}} Cleaning up generated artifacts"
      - cmd: powershell -Command "Remove-Item {{.OUT_DIR}}/*.pdf -ErrorAction SilentlyContinue"
        platforms: [windows]
      - cmd: rm -f {{.OUT_DIR}}/*.pdf
        platforms: [linux, darwin]
